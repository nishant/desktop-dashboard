appId: com.nish.desktop-dashboard
productName: Dashboard
copyright: Copyright © 2025 Nish
# Electron lives in apps/main/node_modules (workspace), not at root — pin the version explicitly.
electronVersion: "33.4.11"
# electron-builder reads "main" from the root package.json (monorepo root has none → defaults to index.js).
# Override it so the bundled package.json correctly points at dist/index.js.
extraMetadata:
  main: dist/index.js

# Disable asar so the server child process can be spawned directly from disk.
# The server entry (packages/server/dist → server/) can't be executed from inside
# an .asar archive, so we keep everything as plain files.
asar: false

directories:
  buildResources: build
  output: release

files:
  # apps/main/package.json has "main": "dist/index.js", so compiled files must land in dist/
  # so Electron finds the entry at app/dist/index.js and __dirname is app/dist/
  - from: apps/main/dist
    to: dist
    filter: ["**/*"]
  # electron-builder requires package.json at the app root (not emitted by tsc)
  - from: apps/main
    to: .
    filter: ["package.json"]
  # main/src/index.ts loads renderer via path.join(__dirname, '../../renderer/dist/index.html')
  # __dirname = app/dist  →  ../../renderer/dist  =  app/renderer/dist  → must match this layout
  - from: apps/renderer/dist
    to: renderer/dist
    filter: ["**/*"]
  # Server is bundled by esbuild (all deps inlined) — only the single output file needed
  - from: packages/server/dist
    to: server
    filter: ["index.js"]

win:
  target: nsis
  icon: build/icon.ico

mac:
  target: dmg
  icon: build/icon.icns
  extendInfo:
    NSLocationWhenInUseUsageDescription: "Dashboard uses your location to show local weather."

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
