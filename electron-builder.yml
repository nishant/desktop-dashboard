appId: com.nish.desktop-dashboard
productName: Dashboard
copyright: Copyright © 2025 Nish
# Electron lives in apps/main/node_modules (workspace), not at root — pin the version explicitly.
electronVersion: "33.4.11"

# Disable asar so the server child process can be spawned directly from disk.
# The server entry (packages/server/dist → server/) can't be executed from inside
# an .asar archive, so we keep everything as plain files.
asar: false

directories:
  buildResources: build
  output: release

files:
  - from: apps/main/dist
    to: .
    filter: ["**/*"]
  # electron-builder requires package.json at the app root (not emitted by tsc)
  - from: apps/main
    to: .
    filter: ["package.json"]
  - from: apps/renderer/dist
    to: renderer
    filter: ["**/*"]
  - from: packages/server/dist
    to: server
    filter: ["**/*"]
  - from: packages/shared/dist
    to: shared
    filter: ["**/*"]
  - node_modules/**

win:
  target: nsis
  icon: build/icon.ico

mac:
  target: dmg
  icon: build/icon.icns

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
